apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jenkins-ci
  namespace: argocd
spec:
  project: default
  source:
    chart: jenkins
    repoURL: https://charts.jenkins.io
    targetRevision: 5.9.25# Use the latest stable version
    helm:
      releaseName: jenkins
      # You can pass values here to configure Jenkins plugins, admin password, etc.
  destination:
    server: https://kubernetes.default.svc
    namespace: jenkins # Create a dedicated namespace for CI
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true