apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-python-app-dev
  namespace: argocd
spec:
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  project: default
  source:
    repoURL: 'https://github.com/MosheBittan/my-app-gitops.git'
    targetRevision: HEAD
    path: app/dev
  syncPolicy:
    automated: {prune: true, selfHeal: true}
