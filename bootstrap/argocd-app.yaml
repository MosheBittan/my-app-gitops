apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-python-app
  namespace: argocd
spec:
  project: default
  source:
    # Point this to YOUR GitOps repository
    repoURL: 'https://github.com/MosheBittan/my-app-gitops.git'
    targetRevision: HEAD
    # The path inside the repository where the Helm chart lives
    path: my-app
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true